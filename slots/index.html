<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: transparent; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .slot-machine { background: #334155; border: 4px solid #f59e0b; border-radius: 15px; padding: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .reel-container { display: flex; gap: 5px; background: #1e293b; padding: 10px; border-radius: 8px; font-size: 30px; margin-bottom: 10px; }
        .reel { width: 50px; text-align: center; }
        button { background: #f59e0b; border: none; padding: 8px 15px; border-radius: 5px; color: #1e293b; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #fbbf24; transform: scale(1.05); }
        button:active { transform: scale(0.95); }
        .result { margin-top: 5px; font-size: 14px; color: #94a3b8; height: 20px; }
    </style>
</head>
<body>
    <div class="slot-machine">
        <div class="reel-container">
            <div id="r1" class="reel">🍀</div>
            <div id="r2" class="reel">🍀</div>
            <div id="r3" class="reel">🍀</div>
        </div>
        <button onclick="spin()">SPIN!</button>
    </div>
    <div id="msg" class="result">今日運勢拉霸</div>

    <script>
        const symbols = ['🍎', '💎', '🍀', '🍒', '7️⃣', '🔔'];
        const fortunes = ["工作大吉！", "Bug 散去！", "開會順利！", "準時下班！", "零食滿滿！", "萬事如意！"];
        function spin() {
            const btn = document.querySelector('button');
            btn.disabled = true;
            document.getElementById('msg').innerText = "旋轉中...";
            let count = 0;
            const timer = setInterval(() => {
                document.getElementById('r1').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('r2').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                document.getElementById('r3').innerText = symbols[Math.floor(Math.random() * symbols.length)];
                count++;
                if (count > 15) {
                    clearInterval(timer);
                    btn.disabled = false;
                    const r1 = document.getElementById('r1').innerText;
                    const r2 = document.getElementById('r2').innerText;
                    const r3 = document.getElementById('r3').innerText;
                    if (r1 === r2 && r2 === r3) {
                        document.getElementById('msg').innerText = "🎊 大獎！" + fortunes[Math.floor(Math.random()*fortunes.length)];
                        document.getElementById('msg').style.color = "#fbbf24";
                    } else {
                        document.getElementById('msg').innerText = fortunes[Math.floor(Math.random()*fortunes.length)];
                        document.getElementById('msg').style.color = "#94a3b8";
                    }
                }
            }, 80);
        }
    </script>
</body>
</html>
