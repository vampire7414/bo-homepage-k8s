apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      annotations:
        # 修改為 version number 觸發 ArgoCD 更新以套用 PVC 掛載
        config-hash: "v40" 
      labels:
        app: homepage
    spec:
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
        env:
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "*"
        volumeMounts:
        # --- 設定檔掛載 (ConfigMap) ---
        - name: config-volume
          mountPath: /app/config/settings.yaml
          subPath: settings.yaml
        - name: config-volume
          mountPath: /app/config/services.yaml
          subPath: services.yaml
        - name: config-volume
          mountPath: /app/config/widgets.yaml
          subPath: widgets.yaml
        - name: config-volume
          mountPath: /app/config/bookmarks.yaml
          subPath: bookmarks.yaml
        - name: config-volume
          mountPath: /app/config/custom.yaml
          subPath: custom.yaml
        - name: logs-volume
          mountPath: /app/config/logs

        # --- 安裝檔下載掛載 (PVC) ---
        - name: iso-downloads
          mountPath: /app/public/downloads

      volumes:
      - name: config-volume
        configMap:
          name: homepage-config
      - name: logs-volume
        emptyDir: {}

      # --- 改用 PVC 替代 hostPath ---
      - name: iso-downloads
        persistentVolumeClaim:
          claimName: homepage-downloads-pvc
