<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>2025 尾牙花絮</title>
    <style>
        /* 針對 Homepage Widget 優化的樣式 */
        body { 
            margin: 0; 
            background: #151515; /* 符合 Dark Mode 背景色 */
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            font-family: sans-serif;
        }
        .slider { 
            width: 100%; 
            height: 100%; 
            position: relative; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        img { 
            position: absolute; 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            opacity: 0; 
            transition: opacity 1.2s ease-in-out; /* 平滑淡入淡出 */
        }
        img.active { 
            opacity: 1; 
        }
        /* 載入中的提示文字（選配） */
        .loading {
            color: #555;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="slider" id="slider">
        <div class="loading">照片載入中...</div>
    </div>

    <script>
        const totalPhotos = 105;
        const slider = document.getElementById('slider');
        
        // 1. 動態產生 105 張圖片的標籤
        for (let i = 1; i <= totalPhotos; i++) {
            const img = document.createElement('img');
            // 這裡精確對應你的檔名 pic_xxx.jpeg (例如 pic_001.jpeg)
            const photoIndex = String(i).padStart(3, '0');
            img.src = `pic_${photoIndex}.jpeg`;
            
            // 第一張預設顯示
            if (i === 1) img.className = 'active';
            
            // 錯誤處理：如果某張圖噴了，跳過不顯示
            img.onerror = () => img.style.display = 'none';
            
            slider.appendChild(img);
        }

        // 移除載入中文字
        const loadingText = document.querySelector('.loading');
        if (loadingText) loadingText.remove();

        // 2. 輪播邏輯
        let currentIndex = 0;
        const imgs = document.querySelectorAll('#slider img');
        
        function showNext() {
            if (imgs.length === 0) return;
            
            // 移除當前圖片的 active
            imgs[currentIndex].classList.remove('active');
            
            // 計算下一張索引
            currentIndex = (currentIndex + 1) % imgs.length;
            
            // 加入 active 觸發淡入
            imgs[currentIndex].classList.add('active');
        }

        // 每 4 秒換一張（扣除 1.2 秒過渡，視覺停約 2.8 秒）
        setInterval(showNext, 4000);
    </script>
</body>
</html>
