apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    # 全域設定：確保所有卡片等高，視覺上才不會亂跳
    useEqualHeights: true 
    layout:
      # 第一層：招呼語與時間 (由上而下渲染)
      頂部看板:
        columns: 1
      # 第二層：核心佈局 (將系統、月曆、公告並排)
      主視角區: 
        style: row
        columns: 3 # 強制分成三等份，月曆就不會霸佔螢幕

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium # 顯示為 Apr 23, 2026

  services.yaml: |
    - 公司系統: # 佔據 1/3
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"

    - 行事曆: # 佔據 1/3，這時月曆的比例會變得很完美
        - widget:
            type: calendar
            view: monthly
            firstDayInWeek: monday
            integrations:
              - type: ical
                url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                name: "台灣節慶"
                color: "pink"

    - 重要公告與連結: # 佔據 1/3
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情。"
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 機房維護。"
        # 把 Google 放在這，它就變成一個小圖示，不再是醜陋的長條
        - Google:
            icon: si-google
            href: https://google.com
            description: "外部搜尋"

  bookmarks.yaml: "" # 這裡留空，確保視覺上不會有重複的導航列
