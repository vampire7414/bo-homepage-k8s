apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 資訊服務入口
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      主看板:
        style: row
        columns: 4

  widgets.yaml: |
    - greeting:
        text: "各位同仁辛苦了，適度休息，工作效率會更高喔！🚀"
        help: false
    - datetime:
        style: clock
        locale: zh-TW
        format:
          dateStyle: "full"
          timeStyle: "short"
          hour12: true
    - openmeteo:
        label: "台中"
        latitude: 24.1620
        longitude: 120.6395
        timezone: "Asia/Taipei"
        units: metric
        cache: 5

  services.yaml: |
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "Nueip 考勤與薪資查詢, 公司代碼97617207"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "AD, NAS, VPN帳號密碼更新"
        - 會議室預約狀況:
            widget:
              type: calendar
              view: agenda
              showTime: true
              maxEvents: 13
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/c_1886ihduqqvcchovioadaf6qaqnrm%40resource.calendar.google.com/public/basic.ics"
                  name: "NTC-8F 會議室"
                  color: "orange"

    - 行事曆:
        - 台灣節慶:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: sunday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"
        - 🎬 當週票房排行榜 (點擊片名看預告):
            widget:
              type: customapi
              url: http://10.8.128.111:5000/movies
              refreshInterval: 3600000
              display: dynamic-list
              text_size: md
              mappings:
                name: name
                label: rank
                target: "{trailer}"
                limit: 6
                format: text

    - 公司資訊與 Wi-Fi:
        - 博悅基本資訊:
            icon: mdi-office-building
            description: |
              統編：97617207
              電話：04-22540279
        - Wi-Fi 資訊 (HS_new):
            icon: mdi-wifi
            description: |
              密碼: Hs-WiFi888
        - Wi-Fi 資訊 (Meet_810):
            icon: mdi-wifi-lock
            description: |
              密碼: Bo-$$$168$$$
        - 2025 尾牙精選花絮:
            widget:
              type: iframe
              src: "http://homepage.eagle.corp/downloads/2025yearend/index.html"
              classes: "h-48 sm:h-52 md:h-56 lg:h-60"
              allowScrolling: no
              refreshInterval: 0

    - 工具與下載:
        - 小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💡 下載若被封鎖請點選「保留」"
        - FortiClient (Windows):
            icon: mdi-microsoft-windows
            href: "/downloads/forti-win.exe"
        - FortiClient (MacOS):
            icon: mdi-apple
            href: "/downloads/forti-mac.dmg"
        - GlobalProtect (Windows):
            icon: mdi-microsoft-windows
            href: "/downloads/gp-win.msi"
        - GlobalProtect (MacOS):
            icon: mdi-apple
            href: "/downloads/gp-mac.pkg"
        - VPN 設定教學 (PDF):
            icon: mdi-file-pdf-box
            href: "/downloads/vpn_client.pdf"
        - 辦公室座位圖(點擊看大圖):
            widget:
              type: iframe
              src: "http://homepage.eagle.corp/downloads/seating/index.html"
              classes: "h-32 sm:h-36 md:h-40 lg:h-44"
              allowScrolling: no
              refreshInterval: 0

    - 常用外部連結:
        - Google 搜尋:
            icon: si-google
            href: https://www.google.com
        - Uber Eats:
            icon: si-ubereats
            href: https://www.ubereats.com
            description: "下午茶、午餐訂購"
        - 115年辦公日曆表:
            icon: mdi-calendar-month
            href: https://www.dgpa.gov.tw/information?uid=41&pid=12573
            description: "行政院人事行政總處"

  bookmarks.yaml: ""
  custom.yaml: ""
