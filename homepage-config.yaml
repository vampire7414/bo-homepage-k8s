apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:

  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate

    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    statusStyle: dot

    layout:
      頂部資訊:
        columns: 4

      公司系統:
        columns: 3

      行事曆:
        columns: 1

      重要公告:
        columns: 2

      常用連結:
        columns: 1


  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天 ☕"
        help: false

    - datetime:
        style: clock
        hour12: true

    - datetime:
        format:
          dateStyle: medium


  services.yaml: |
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "考勤 / 請假"

        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "帳號安全"

        - VPN下載:
            icon: mdi-laptop
            href: http://vpn.eagle.corp
            description: "遠端辦公"

    - 行事曆:
        - 本月行事:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: 台灣節慶
                  color: pink

    - 重要公告:
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 放鬆心情，開始今天的工作"

        - 今日提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五機房維護，請提前儲存資料"

    - 常用連結:
        - Google:
            icon: si-google
            href: https://google.com
