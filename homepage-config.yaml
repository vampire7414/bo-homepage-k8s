apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      # 只定義一個大容器，讓內容自然由上而下、由左而右流動
      全域看板:
        style: row
        columns: 4 

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium 

  services.yaml: |
    # 按照你想呈現的順序排列，這樣就不會亂跳了
    
    - 公司系統: # 佔據 2/4 寬度 (左側主體)
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"

    - 行事曆: # 佔據 1/4 寬度 (中間輔助)
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    - 重要公告: # 佔據 1/4 寬度 (右側訊息)
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸..."
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 機房維護。"

    # 把 Google 直接塞在最後一個 Service Group，它就絕對會在底部！
    - 外部資源: 
        - Google 搜尋:
            icon: si-google
            href: https://google.com
            description: "不常用的搜尋工具"
