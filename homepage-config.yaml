apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 資訊服務入口
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      主看板:
        style: row
        columns: 4

  widgets.yaml: |
    - greeting:
        text: "各位同仁辛苦了，別忘了喝水休息一下！"
        help: false
    - datetime:
        style: clock
        locale: zh-TW
        format:
          dateStyle: "full"
          timeStyle: "short"
          hour12: true
    - openmeteo:
        label: "台中辦公室"
        latitude: 24.1620
        longitude: 120.6395
        timezone: "Asia/Taipei"
        units: metric
        cache: 5
          
  services.yaml: |
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "Nueip 簽到與請假"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "AD, NAS, VPN帳號密碼更新"

    - 行事曆:
        - 月曆:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"
    
    - 公司資訊與 Wi-Fi:
        - 博悅基本資訊:
            icon: mdi-office-building
            description: |
              統編：97617207
              電話：04-22540279
        - 辦公室分機:
            icon: mdi-phone-classic
            description: |
              HR Whitney #801
              MIS ZeYu #803
        - Wi-Fi 資訊 (HS_new):
            icon: mdi-wifi
            description: |
              SSID: HS_new
              密碼: Hs-WiFi888
        - Wi-Fi 資訊 (Meet):
            icon: mdi-wifi-lock
            description: |
              SSID: Meet_810
              密碼: Bo-$$$168$$$
    
    - 工具與下載:
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💡 下載若被封鎖請點選「保留」"
        - FortiClient (Windows):
            icon: mdi-microsoft-windows
            href: "/downloads/forti-win.exe"
        - FortiClient (MacOS):
            icon: mdi-apple
            href: "/downloads/forti-mac.dmg"
        - GlobalProtect (Windows):
            icon: mdi-microsoft-windows
            href: "/downloads/gp-win.msi"
        - GlobalProtect (MacOS):
            icon: mdi-apple
            href: "/downloads/gp-mac.pkg"

  bookmarks.yaml: ""
  custom.yaml: ""
