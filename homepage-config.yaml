apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      今日看板:
        columns: 4
      公司系統:
        columns: 3
      # 對應 services.yaml 中的獨立群組名
      行事曆區塊: 
        style: row     # 讓月曆橫向展開
        columns: 1
      常用連結:
        columns: 2

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true

  services.yaml: |
    - 行事曆區塊:        # 1. 定義一個群組
        - 點我打開月曆:  # 2. 定義一個服務項目 (這是月曆的家)
            icon: mdi-calendar-month
            widget:      # 3. 在服務項目內定義 widget
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"

    - 重要公告:
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情開始今天的工作。"
