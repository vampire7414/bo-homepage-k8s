apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    statusStyle: dot
    layout:
      頂部資訊:
        columns: 1
      主工作區: 
        style: row
        columns: 12 # 改用 12 欄位制（類似網頁設計的 Bootstrap 概念）
      底部區:
        columns: 4  # 讓 Google 連結縮小，不要撐滿整行

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium 

  services.yaml: |
    # 在 12 欄制中，我們手動分配比例
    - 公司系統: # 這裡我們設定讓它在 layout 裡佔據較多位置
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"

    - 行事曆: # 將月曆放在這個群組
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    - 重要公告: 
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情開始今天的工作。"
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五下午機房維護。"

    - 底部區: # 這是新增的群組，專門放不重要的東西
        - Google:
            icon: si-google
            href: https://google.com
            description: "外部搜尋"

  bookmarks.yaml: |
    # 這裡可以暫時留空，或把沒用的連結刪掉，統一用 services 管理美觀度
