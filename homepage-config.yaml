apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      # 只留一個大容器，設定為 4 欄，這會讓 1/4 的組件看起來非常精緻
      主看板:
        style: row
        columns: 4

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium # 確保顯示為 Apr 23, 2026

  services.yaml: |
    # 按照順序，Homepage 會自動填滿 4 欄的空間
    
    - 公司系統: # 佔 2 欄 (左側主導地位)
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "考勤與請假"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "帳號安全管理"
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"
            description: "遠端辦公工具"

    - 行事曆: # 佔 1 欄 (中間輔助，絕不搶戲)
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    - 資訊與工具: # 佔 1 欄 (右側收納)
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情。"
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五下午機房維護。"
        # 把 Google 縮小放在這裡，它就只是一個小按鈕，再也不會橫跨全螢幕！
        - Google 搜尋:
            icon: si-google
            href: https://google.com
            description: "外部搜尋工具"

  bookmarks.yaml: "" # 徹底清空，避免產生多餘的標題列
