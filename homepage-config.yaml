apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 資訊服務入口
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      主看板:
        style: row
        columns: 4

  widgets.yaml: |
    - greeting:
        text: "各位同仁辛苦了，別忘了喝水休息一下！"
        help: false
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium
    - weather:
        label: "台中辦公室"
        location: "Taichung, Taiwan"
        units: metric
        cache: 30
          
  services.yaml: |
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "Nueip 簽到與請假"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "定期更換密碼保護帳號安全"

    - 行事曆:
        - 月曆:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"
    
    - 公司資訊與 Wi-Fi:
        - 博悅基本資訊:
            icon: mdi-office-building
            # 使用 | 進行強制換行
            description: |
              統編：97617207
              電話：04-22540279
        - 辦公室分機:
            icon: mdi-phone-classic
            description: |
              HR Whitney #801
              MIS ZeYu #803
        - Wi-Fi 資訊 (HS):
            icon: mdi-wifi
            # 加入 href copy 功能，點擊直接複製密碼
            href: "copy:Hs-WiFi888"
            description: |
              SSID: HS_new
              密碼: Hs-WiFi888 (點擊複製)
        - Wi-Fi 資訊 (Meet):
            icon: mdi-wifi-lock
            href: "copy:Bo-$$$168$$$"
            description: |
              SSID: Meet_810
              密碼: Bo-$$$168$$$ (點擊複製)
    
    - 工具與下載:
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五放輕鬆。"
        - Google 搜尋:
            icon: si-google
            href: https://google.com
        - FortiClient (Win):
            icon: mdi-microsoft-windows
            href: "/downloads/forti-win.exe"
        - FortiClient (Mac):
            icon: mdi-apple
            href: "/downloads/forti-mac.dmg"
        - GlobalProtect (Win):
            icon: mdi-microsoft-windows
            href: "/downloads/gp-win.msi"
        - GlobalProtect (Mac):
            icon: mdi-apple
            href: "/downloads/gp-mac.pkg"

  bookmarks.yaml: ""
  custom.yaml: ""
