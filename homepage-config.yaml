apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    statusStyle: dot
    layout:
      今日看板: # 放置招呼語與大時鐘
        columns: 4
      行事曆: # 給月曆一個寬敞的獨立空間
        columns: 1
      公司系統:
        columns: 3
      常用連結:
        columns: 2

  widgets.yaml: |
    # 1. 加入親切招呼語，增加趣味性
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true

    # 2. 視覺中心：大時鐘
    - datetime:
        style: clock
        hour12: true

    # 3. 月分月曆組件 (仿照你上傳的參考圖)
    - calendar:
        firstDay: 1          # 星期一為第一天
        view: monthly        # 關鍵！呈現整個月的格子
        limit: 10
        showAge: true
        # 加入台灣國定假日，讓月曆看起來更豐富有色塊
        providers:
          - ical:
              url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
              name: "台灣節慶"
              color: "pink"

  services.yaml: |
    - 重要公告:
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情開始今天的工作。"
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五下午機房維護，下班前記得儲存文件。"

    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "考勤與請假"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "帳號安全管理"
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"
            description: "遠端辦公工具"

  bookmarks.yaml: |
    - 常用連結:
        - Google:
            - icon: si-google
              href: https://google.com
