apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    statusStyle: dot
    layout:
      # 1. 頂部招呼 (佔據全寬)
      頂部資訊:
        columns: 1
      # 2. 核心區 (將系統、月曆、公告平分為 3 欄)
      主工作區: 
        style: row
        columns: 3

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true

    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium # 確保日期顯示為 Apr 23, 2026

  services.yaml: |
    # 公司系統 (左欄)
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "考勤與請假"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "帳號安全管理"
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"
            description: "遠端辦公工具"

    # 行事曆 (中欄 - 輔助地位)
    - 行事曆:
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    # 重要公告與工具連結 (右欄)
    - 重要公告: 
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情開始今天的工作。"
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五下午機房維護。"
        # 巧妙地將 Google 放在這裡，讓它變成側邊欄的一個精緻按鈕，不再醜陋
        - Google 搜尋:
            icon: si-google
            href: https://google.com
            description: "外部搜尋工具"

  bookmarks.yaml: "" # 徹底清空，不再使用
