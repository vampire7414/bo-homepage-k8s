apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      # 1. 第一排：招呼語
      頂部資訊:
        columns: 1
      # 2. 第二排：主體 (系統 2/4, 月曆 1/4, 公告 1/4)
      核心看板區: 
        style: row
        columns: 4
      # 3. 第三排：最不重要的 Google 連結 (縮小至左下角)
      頁尾工具:
        columns: 4

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium # 顯示為 Apr 23, 2026

  services.yaml: |
    # --- 第一排 ---
    - 頂部資訊:
        - widget:
            type: greeting

    # --- 第二排 (主體區) ---
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"

    - 行事曆:
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    - 重要公告: 
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情。"
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五機房維護。"

    # --- 第三排 (頁尾) ---
    - 頁尾工具:
        - Google:
            icon: si-google
            href: https://google.com
            description: "外部搜尋"

  bookmarks.yaml: "" # 這裡留空，完全靠 services.yaml 控制位置
