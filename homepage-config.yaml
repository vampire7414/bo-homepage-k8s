apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    statusStyle: dot
    layout:
      # 第一層：寬敞的頂部招呼區
      頂部資訊:
        columns: 1
      # 第二層：核心工作區（透過 style: row 強制左右對等分配，或微調 columns）
      主工作區: 
        style: row
        columns: 5 # 增加總欄數，讓分配更精細
      # 第三層：底部頁尾（放置 Google 等次要連結）
      頁尾區:
        columns: 1

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true

    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium # 顯示為 Apr 23, 2026

  services.yaml: |
    # 在 5 欄佈局中，給予公司系統與公告更大的空間，將月曆壓縮在正中央或側邊
    - 公司系統: # 佔據 2/5 空間
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "考勤與請假"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "帳號安全管理"
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"
            description: "遠端辦公工具"

    - 行事曆: # 佔據 1/5 空間，這會讓它縮小到最精緻的比例
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    - 重要公告: # 佔據 2/5 空間
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸，放鬆心情開始今天的工作。"
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五下午機房維護。"

  bookmarks.yaml: |
    - 常用連結: # 獨立在頁尾區，寬度會自動撐滿但因為在最下面，不會干擾視覺重心
        - Google:
            - icon: si-google
              href: https://google.com
