apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    layout:
      # 使用 4 欄位佈局，讓各組件比例協調
      主看板:
        style: row
        columns: 4

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium

  services.yaml: |
    # --- 第一組：主要系統 (佔 2/4 寬度) ---
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
            description: "考勤與請假"
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
            description: "帳號安全管理"

    # --- 第二組：行事曆 (佔 1/4 寬度) ---
    - 行事曆:
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    # --- 第三組：工具與 VPN 下載 (佔 1/4 寬度) ---
    - 工具與下載:
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 週五下午機房維護。"
        - Google 搜尋:
            icon: si-google
            href: https://google.com
        
        # VPN 下載連結 (已對應簡化後的檔名)
        - FortiClient (Win):
            icon: mdi-microsoft-windows
            href: "/downloads/forti-win.exe"
        - FortiClient (Mac):
            icon: mdi-apple
            href: "/downloads/forti-mac.dmg"
        - GlobalProtect (Win):
            icon: mdi-microsoft-windows
            href: "/downloads/gp-win.msi"
        - GlobalProtect (Mac):
            icon: mdi-apple
            href: "/downloads/gp-mac.pkg"

  bookmarks.yaml: ""
  custom.yaml: ""
