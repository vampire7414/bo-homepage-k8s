apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: 🌿 內網連結中心
    theme: dark
    color: slate
    background: "linear-gradient(135deg, #2c2c2c 0%, #1a1a1a 100%)"
    cardBlur: md
    statusStyle: dot
    layout:
      # 順序決定位置：由上而下排列
      頂部資訊:
        columns: 1
      主工作區: 
        # 移除 style: row，讓系統自動根據 columns 比例縮放
        columns: 3 
      頁尾區:
        columns: 4 # 這裡設定較多 columns，會讓裡面的 Google 變小

  widgets.yaml: |
    - greeting:
        text: "哈囉！今天也是美好的一天。"
        help: true
    - datetime:
        style: clock
        hour12: true
        format:
          dateStyle: medium 

  services.yaml: |
    # 對應「頂部資訊」
    - 頂部資訊:
        - widget:
            type: datetime
            style: clock

    # 對應「主工作區」
    - 公司系統:
        - 人事系統:
            icon: mdi-account-box-multiple
            href: https://portal.nueip.com/login
        - 密碼修改:
            icon: mdi-shield-key-outline
            href: http://password.eagle.corp/iisadmpwd
        - VPN下載:
            icon: mdi-laptop
            href: "http://vpn.eagle.corp"

    - 行事曆:
        - 月曆組件:
            widget:
              type: calendar
              view: monthly
              firstDayInWeek: monday
              integrations:
                - type: ical
                  url: "https://calendar.google.com/calendar/ical/zh-tw.taiwan%23holiday%40group.v.calendar.google.com/public/basic.ics"
                  name: "台灣節慶"
                  color: "pink"

    - 重要公告: 
        - 歡迎詞:
            icon: mdi-pine-tree
            description: "☕ 深呼吸..."
        - 今日小提醒:
            icon: mdi-alert-circle-check-outline
            description: "💖 機房維護。"

    # 對應「頁尾區」
    - 頁尾區: 
        - Google:
            icon: si-google
            href: https://google.com
            description: "外部搜尋"

  bookmarks.yaml: "" # 保持清空，避免干擾佈局
